services:
  # Backend Service
  - type: web
    name: securedata-backend
    runtime: docker
    env: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: securedata-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: CORS_ORIGINS
        value: https://securedata-frontend.onrender.com

  # Frontend Service
  - type: web
    name: securedata-frontend
    runtime: docker
    env: docker
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: securedata-backend
          type: web
          property: url

databases:
  - name: securedata-db
    databaseName: securedata
    user: securedata_user
